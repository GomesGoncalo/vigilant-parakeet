# Thesis topology: Linear-3
#
#   server1
#     └── rsu1  (cloud channel, auto-created)
#           └── obu1  (direct VANET, 10 ms latency)
#                 └── obu2  (relay hop, 10 ms latency)
#
# OBU2 must route through OBU1 to reach RSU1 (two-hop path).
# hello_periodicity = 500 ms; convergence expected within 1-2 hello intervals.
#
# Variants (N-best sweep):
#   simulator_n0.yaml  — hop-count only     (cached_candidates = 0)
#   simulator_n1.yaml  — latency metric N=1 (cached_candidates = 1)
#   simulator_n3.yaml  — latency metric N=3 (cached_candidates = 3)  ← this file

nodes:
  server1:
    config_path: examples/thesis/linear-3/nodes/server1.yaml
  rsu1:
    config_path: examples/thesis/linear-3/nodes/rsu1.yaml
  obu1:
    config_path: examples/thesis/linear-3/nodes/obu1.yaml
  obu2:
    config_path: examples/thesis/linear-3/nodes/obu2.yaml

topology:
  rsu1:
    obu1:
      latency: 10
      loss: 0.0
  obu1:
    rsu1:
      latency: 10
      loss: 0.0
    obu2:
      latency: 10
      loss: 0.0
  obu2:
    obu1:
      latency: 10
      loss: 0.0
